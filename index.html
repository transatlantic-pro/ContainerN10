  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

======= TRANSIT ANIMATION ===================== -->\n<section id=\"scan\" data-screen-label=\"Груз в&nbsp;пути\" style=\"position:relative;padding:120px 32px;background:#04050a;border-top:1px solid var(--line);overflow:hidden;\">\n  <div style=\"position:absolute;inset:0;background:radial-gradient(60% 70% at 50% 50%, rgba(38,104,255,.1), transparent 72%);pointer-events:none;\"><\u002Fdiv>\n  <div style=\"position:relative;max-width:900px;margin:0 auto;text-align:center;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.28em;color:var(--ikb);text-transform:uppercase;margin-bottom:54px;\">// груз в&nbsp;пути<\u002Fdiv>\n\n    <div data-r=\"manifest-shell\" ref=\"{{ manifestRef }}\" style=\"margin-top:64px;text-align:left;border:1px solid var(--line);background:rgba(6,8,16,.4);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);overflow:hidden;\">\n      <div style=\"display:flex;justify-content:space-between;align-items:center;padding:16px 22px;border-bottom:1px solid var(--line);\">\n        <div data-r=\"manifest-head\" style=\"display:flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.2em;color:#dfe4f2;text-transform:uppercase;white-space:nowrap;min-width:0;overflow:hidden;text-overflow:ellipsis;\"><span style=\"width:7px;height:7px;background:var(--ikb);border-radius:50%;box-shadow:0 0 9px var(--ikb);animation:blink 1.4s ease-in-out infinite;flex:none;\"><\u002Fspan><span style=\"overflow:hidden;text-overflow:ellipsis;white-space:nowrap;\">Live manifest · N.10<\u002Fspan><\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.16em;color:#6b7290;flex:none;\">UTC+3<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:7px;padding:13px 22px;border-bottom:1px solid var(--line);background:rgba(38,104,255,.1);border-left:3px solid var(--ikb);\">\n        <div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:14px;font-family:'JetBrains Mono',monospace;\">\n          <div data-r=\"manifest-main-row\" style=\"display:flex;align-items:baseline;gap:10px;min-width:0;font-size:clamp(12.5px,3.6vw,20px);font-weight:700;letter-spacing:.03em;color:#f3f5fb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">\n            <span style=\"color:var(--ikb);flex-shrink:0;\">{{ mainRow.code }}<\u002Fspan><span>{{ mainRow.from }}<\u002Fspan><span style=\"color:var(--ikb);\">→<\u002Fspan><span>{{ mainRow.to }}<\u002Fspan>\n          <\u002Fdiv>\n          <div ref=\"{{ mainRow.statRef }}\" style=\"font-size:12px;letter-spacing:.1em;color:var(--ikb);white-space:nowrap;flex-shrink:0;\">В ПУТИ<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position:relative;height:4px;background:rgba(150,175,255,.14);overflow:hidden;\">\n          <div ref=\"{{ mainRow.barRef }}\" style=\"position:absolute;top:0;left:0;height:100%;width:0;background:linear-gradient(90deg,rgba(38,104,255,.4),var(--ikb));box-shadow:0 0 10px rgba(38,104,255,.85);\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <sc-for list=\"{{ manifest }}\" as=\"r\" hint-placeholder-count=\"5\">\n      <div style=\"display:flex;flex-direction:column;gap:6px;padding:12px 22px;border-bottom:1px solid rgba(255,255,255,.06);\">\n        <div style=\"display:flex;justify-content:space-between;align-items:baseline;gap:14px;font-family:'JetBrains Mono',monospace;\">\n          <div data-r=\"manifest-row\" style=\"display:flex;align-items:baseline;gap:10px;min-width:0;font-size:clamp(9.5px,3vw,16px);letter-spacing:.03em;color:#eef1fa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">\n            <span style=\"color:#6b7290;flex-shrink:0;\">{{ r.code }}<\u002Fspan><span>{{ r.from }}<\u002Fspan><span style=\"color:var(--ikb);\">→<\u002Fspan><span>{{ r.to }}<\u002Fspan>\n          <\u002Fdiv>\n          <div ref=\"{{ r.statRef }}\" style=\"font-size:11px;letter-spacing:.1em;color:var(--ikb);white-space:nowrap;flex-shrink:0;\">В ПУТИ<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position:relative;height:3px;background:rgba(150,175,255,.1);overflow:hidden;\">\n          <div ref=\"{{ r.barRef }}\" style=\"position:absolute;top:0;left:0;height:100%;width:0;background:linear-gradient(90deg,rgba(38,104,255,.35),var(--ikb));box-shadow:0 0 8px rgba(38,104,255,.7);\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-for>\n      <div style=\"display:flex;justify-content:space-between;align-items:center;padding:14px 22px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;\">\n        <span style=\"color:#6b7290;\">5 ХАБОВ · ∞ МАРШРУТОВ<\u002Fspan><span style=\"color:var(--ikb);\">10 ЛЕТ В ПУТИ<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== RSVP ===================== -->\n<section id=\"rsvp\" data-screen-label=\"Декларация участника\" style=\"position:relative;padding:130px 32px 150px;background:#06070e;border-top:1px solid var(--line);overflow:hidden;\">\n  <div style=\"position:absolute;inset:0;background:radial-gradient(60% 50% at 50% 0%, rgba(38,104,255,.12), transparent 70%);pointer-events:none;\"><\u002Fdiv>\n  <div style=\"position:relative;max-width:760px;margin:0 auto;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.3em;color:var(--ikb);text-transform:uppercase;margin-bottom:26px;text-align:center;\">// таможенная декларация<\u002Fdiv>\n    <h2 style=\"font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:700;font-size:clamp(34px,5.4vw,72px);line-height:.98;letter-spacing:-.01em;margin:0 0 12px;text-transform:uppercase;color:#f3f5fb;text-align:center;\">Подтвердите участие<\u002Fh2>\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.1em;color:var(--muted);margin-bottom:48px;text-align:center;\">Оформите декларацию — и&nbsp;займите своё место на&nbsp;борту N.10<\u002Fdiv>\n\n    <sc-if value=\"{{ notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n    <form sc-camel-on-submit=\"{{ submit }}\" style=\"border:1px solid var(--line);background:rgba(8,11,22,.6);padding:clamp(26px,4vw,46px);display:flex;flex-direction:column;gap:30px;\">\n      <div style=\"display:flex;flex-direction:column;gap:9px;\">\n        <label style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;\">Имя и&nbsp;фамилия <span style=\"color:var(--ikb);\">*<\u002Fspan><\u002Flabel>\n        <input value=\"{{ name }}\" sc-camel-on-change=\"{{ onName }}\" placeholder=\"Как указать в&nbsp;коносаменте\" style=\"background:rgba(4,5,12,.7);border:1px solid var(--line);color:#f3f5fb;padding:15px 16px;font-size:16px;letter-spacing:.01em;outline:none;\" style-focus=\"border-color:var(--ikb);box-shadow:0 0 0 1px var(--ikb);\">\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:9px;\">\n        <label style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;\">Компания / роль<\u002Flabel>\n        <input value=\"{{ company }}\" sc-camel-on-change=\"{{ onCompany }}\" placeholder=\"Например, капитан логистики\" style=\"background:rgba(4,5,12,.7);border:1px solid var(--line);color:#f3f5fb;padding:15px 16px;font-size:16px;letter-spacing:.01em;outline:none;\" style-focus=\"border-color:var(--ikb);box-shadow:0 0 0 1px var(--ikb);\">\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:12px;\">\n        <label style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;\">Будете ли&nbsp;вы на&nbsp;борту? <span style=\"color:var(--ikb);\">*<\u002Fspan><\u002Flabel>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:12px;\">\n          <sc-for list=\"{{ attendOptions }}\" as=\"opt\" hint-placeholder-count=\"3\">\n            <button type=\"button\" sc-camel-on-click=\"{{ opt.click }}\" style=\"{{ opt.style }}\">{{ opt.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div data-r=\"stack\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;\">\n        <div style=\"display:flex;flex-direction:column;gap:9px;\">\n          <label style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;\">Телефон <span style=\"color:var(--ikb);\">*<\u002Fspan><\u002Flabel>\n          <input type=\"tel\" value=\"{{ phone }}\" sc-camel-on-change=\"{{ onPhone }}\" placeholder=\"+7 900 000-00-00\" style=\"background:rgba(4,5,12,.7);border:1px solid var(--line);color:#f3f5fb;padding:15px 16px;font-size:16px;outline:none;\" style-focus=\"border-color:var(--ikb);box-shadow:0 0 0 1px var(--ikb);\">\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:9px;\">\n          <label style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;\">E-mail <span style=\"color:var(--muted);text-transform:none;letter-spacing:0;\"><\u002Fspan><\u002Flabel>\n          <input type=\"email\" value=\"{{ contact }}\" sc-camel-on-change=\"{{ onContact }}\" placeholder=\"you@mail.com\" style=\"background:rgba(4,5,12,.7);border:1px solid var(--line);color:#f3f5fb;padding:15px 16px;font-size:16px;outline:none;\" style-focus=\"border-color:var(--ikb);box-shadow:0 0 0 1px var(--ikb);\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:9px;\">\n        <label style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;\">Записка в&nbsp;капсулу 2036<\u002Flabel>\n        <textarea value=\"{{ note }}\" sc-camel-on-change=\"{{ onNote }}\" rows=\"3\" placeholder=\"Пожелание, прогноз или идея для&nbsp;компании на&nbsp;следующие 10 лет\" style=\"background:rgba(4,5,12,.7);border:1px solid var(--line);color:#f3f5fb;padding:15px 16px;font-size:16px;line-height:1.5;outline:none;resize:vertical;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;\" style-focus=\"border-color:var(--ikb);box-shadow:0 0 0 1px var(--ikb);\"><\u002Ftextarea>\n      <\u002Fdiv>\n      <sc-if value=\"{{ err }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.08em;color:#ff7a7a;\">⚠ {{ err }}<\u002Fdiv>\n      <\u002Fsc-if>\n      <button type=\"submit\" style=\"font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:.16em;text-transform:uppercase;color:#fff;border:1px solid var(--ikb);background:var(--ikb);padding:19px;cursor:pointer;margin-top:6px;\" style-hover=\"box-shadow:0 0 34px rgba(38,104,255,.6);\">Оформить декларацию →<\u002Fbutton>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.04em;line-height:1.6;color:var(--muted);text-transform:none;margin-top:2px;\">Нажимая «Оформить декларацию», вы соглашаетесь на&nbsp;обработку данных. <a href=\"#\" sc-camel-on-click=\"{{ openPrivacy }}\" style=\"color:var(--muted);text-decoration:underline;\">Подробнее<\u002Fa><\u002Fdiv>\n    <\u002Fform>\n    <sc-if value=\"{{ privacyOpen }}\">\n      <div sc-camel-on-click=\"{{ closePrivacy }}\" style=\"position:fixed;inset:0;z-index:200;background:rgba(4,6,14,.72);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:24px;\">\n        <div sc-camel-on-click=\"{{ stop }}\" style=\"max-width:440px;background:#0b0e18;border:1px solid var(--line);padding:28px 26px;position:relative;\">\n          <button type=\"button\" sc-camel-on-click=\"{{ closePrivacy }}\" style=\"position:absolute;top:14px;right:14px;background:none;border:none;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:13px;cursor:pointer;\">✕<\u002Fbutton>\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;color:#dfe4f2;text-transform:uppercase;margin-bottom:14px;\">Обработка данных<\u002Fdiv>\n          <div style=\"font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:14px;line-height:1.7;color:#c4c9da;\">Отправляя заявку, вы соглашаетесь на&nbsp;обработку указанных персональных данных (имя, телефон, email) организатором мероприятия исключительно в&nbsp;целях регистрации и&nbsp;связи по&nbsp;вопросам вечера. Данные не передаются третьим лицам и&nbsp;удаляются после мероприятия.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"border:1px solid var(--ikb);background:rgba(8,11,22,.7);padding:clamp(34px,5vw,60px);text-align:center;position:relative;box-shadow:0 0 60px rgba(38,104,255,.2) inset;\">\n      <div style=\"display:inline-block;border:2px solid var(--ikb);color:var(--ikb);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:700;font-size:34px;letter-spacing:.06em;padding:10px 26px;text-transform:uppercase;transform:rotate(-5deg);margin-bottom:30px;\">ВЫПУЩЕН · 10/10<\u002Fdiv>\n      <div style=\"font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:700;font-size:clamp(28px,4vw,46px);text-transform:uppercase;color:#f3f5fb;line-height:1;margin-bottom:8px;\">{{ name }}<\u002Fdiv>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;margin-bottom:28px;\">{{ attendLabel }}<\u002Fdiv>\n      <div style=\"display:inline-flex;flex-direction:column;gap:6px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:18px 36px;margin-bottom:28px;\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.24em;color:var(--muted);\">ВАШ BIC-КОД КОНТЕЙНЕРА<\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-weight:700;font-size:30px;letter-spacing:.1em;color:var(--ikb);\">{{ code }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:15px;line-height:1.6;color:#c4c9da;max-width:440px;margin:0 auto 26px;\">Декларация оформлена — увидимся на&nbsp;борту N.10.<\u002Fdiv>\n      <button type=\"button\" sc-camel-on-click=\"{{ edit }}\" style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);background:transparent;padding:13px 24px;cursor:pointer;\" style-hover=\"color:#fff;border-color:var(--ikb);\">Изменить декларацию<\u002Fbutton>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== DEPARTURE COUNTDOWN (FINAL) ===================== -->\n<section id=\"departure\" data-screen-label=\"Отсчёт до&nbsp;отправления\" style=\"position:relative;padding:150px 32px 96px;background:#04050a;border-top:1px solid var(--line);overflow:hidden;\">\n  <!-- bottom light bloom — doors opening -->\n  <div style=\"position:absolute;left:0;right:0;bottom:0;height:64%;background:radial-gradient(58% 100% at 50% 100%, rgba(38,104,255,.22), rgba(38,104,255,.05) 46%, transparent 74%);pointer-events:none;\"><\u002Fdiv>\n\n  <div style=\"position:relative;z-index:1;max-width:1120px;margin:0 auto;text-align:center;\">\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.3em;color:var(--ikb);text-transform:uppercase;margin-bottom:30px;\">// отсчёт до&nbsp;отправления<\u002Fdiv>\n    <h2 style=\"font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-weight:600;font-size:clamp(30px,4.6vw,64px);line-height:1.0;letter-spacing:-.02em;margin:0 0 8px;text-transform:uppercase;color:#f3f5fb;\">Двери N.10 <span style=\"color:var(--ikb);\">ра &quot;Тема&quot;}}\">\nclass Component extends DCLogic {\n  state = { name:'', company:'', attend:'', guests:'0', phone:'', note:'', contact:'', submitted:false, code:'', err:'', open:false, privacyOpen:false };\n  // ↓↓↓ Paste your Google Apps Script Web App URL (or form-service endpoint) between the quotes ↓↓↓\n  RSVP_ENDPOINT = 'https://script.google.com/macros/s/AKfycbwBpGuLxqTygqqC1gCjfsN_N42nQ3g-evCi5eAcLiVBny302nIiAeuy9_1NHaiFIk1N3w/exec';\n  cdRefs = { d:React.createRef(), h:React.createRef(), m:React.createRef(), s:React.createRef() };\n  finalRefs = { d:React.createRef(), h:React.createRef(), m:React.createRef(), s:React.createRef() };\n  stageRef = React.createRef();\n  fxRef = React.createRef();\n  latRef = React.createRef();\n  lonRef = React.createRef();\n  hdgRef = React.createRef();\n  altRef = React.createRef();\n  leftDoorRef = React.createRef();\n  rightDoorRef = React.createRef();\n  heroContentRef = React.createRef();\n  manifestRef = React.createRef();\n  cLabel = React.createRef();\n  cHead = React.createRef();\n  cSub = React.createRef();\n  cFig = React.createRef();\n  _scrollShown = new Set();\n  _doorsOpen = false;\n  _revealTimers = [];\n  _shownEls = [];\n\n  prefersReduced(){\n    return this.props.reduceMotion || (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);\n  }\n\n  componentDidMount(){\n    try { const s = JSON.parse(localStorage.getItem('container10_rsvp')||'null'); if (s) this.setState(s); } catch(e){}\n    this.applyTheme();\n    this.initScene();\n    this.startCountdown();\n    this.startCoords();\n    this.startManifest();\n    this.openDoors();\n    this.reveal(this.heroContentRef, { delay: 1850, dur: 1000, ty: 34 });\n    this.setupScrollReveal();\n  }\n  setupScrollReveal(){\n    const words = Array.from(this.cHead.current ? this.cHead.current.querySelectorAll('[data-word]') : []);\n    const blocks = [this.cLabel, this.cSub, this.cFig].map(r => r.current).filter(Boolean);\n    this._brightWords = words;\n    this._brightBlocks = blocks;\n    if (this.prefersReduced()){\n      words.forEach(w => w.style.opacity = '1');\n      blocks.forEach(b => b.style.opacity = '1');\n      return;\n    }\n    let ticking = false;\n    this._onScrollReveal = () => {\n      if (ticking) return; ticking = true;\n      requestAnimationFrame(() => { ticking = false; this.paintBright(); });\n    };\n    window.addEventListener('scroll', this._onScrollReveal, { passive:true });\n    window.addEventListener('resize', this._onScrollReveal);\n    this.paintBright();\n  }\n  paintBright(){\n    const vh = window.innerHeight || document.documentElement.clientHeight;\n    // brighten as an element rises from 82% -> 40% of the viewport height\n    const start = vh * 0.82, end = vh * 0.40;\n    const ramp = (el, floor) => {\n      const rect = el.getBoundingClientRect();\n      const y = rect.top + rect.height / 2;\n      let p = (start - y) / (start - end);\n      p = p < 0 ? 0 : p > 1 ? 1 : p;\n      el.style.opacity = (floor + (1 - floor) * p).toFixed(3);\n    };\n    if (this._brightWords) for (const w of this._brightWords) ramp(w, 0.14);\n    if (this._brightBlocks) for (const b of this._brightBlocks) ramp(b, 0.20);\n  }\n  reveal(ref, opt){\n    const el = ref.current;\n    if (!el) { setTimeout(() => this.reveal(ref, opt), 60); return; }\n    const ty = opt.ty || 24;\n    const apply = (k) => { el.style.opacity = String(k); el.style.transform = 'translateY(' + ((1 - k) * ty) + 'px)'; };\n    if (this.prefersReduced()) { el.style.opacity = '1'; el.style.transform = 'none'; return; }\n    const delay = opt.delay || 0, dur = opt.dur || 900;\n    let start = null, done = false;\n    const ease = (t) => 1 - Math.pow(1 - t, 3);\n    const step = (ts) => {\n      if (done) return;\n      if (start === null) start = ts;\n      const e = ts - start - delay;\n      if (e < 0) { requestAnimationFrame(step); return; }\n      const t = Math.min(1, e / dur);\n      apply(ease(t)); f (this.prefersReduced()){\n      this.manifest.forEach(r=>{ if(r.barRef.current) r.barRef.current.style.width=Math.round(r.p*100)+'%'; });\n      if (this.mainRow.barRef.current) this.mainRow.barRef.current.style.width = Math.round(this.mainRow.p*100)+'%';\n      return;\n    }\n    this._manInt = setInterval(()=>{\n      for (const r of this.manifest){\n        r.p += r.speed;\n        if (r.p >= 1){ r.p = 0; r.arrived = 18; }\n        if (r.barRef.current) r.barRef.current.style.width = (r.p*100).toFixed(1)+'%';\n        if (r.statRef.current){\n          if (r.arrived>0){ r.arrived--; r.statRef.current.textContent='ПРИБЫЛ'; r.statRef.current.style.color='#cdd4e8'; }\n          else { r.statRef.current.textContent='В ПУТИ · '+Math.round(r.p*100)+'%'; r.statRef.current.style.color='var(--ikb)'; }\n        }\n      }\n      // N.10 is the decade-long journey itself: it approaches but never completes\n      const mr = this.mainRow;\n      mr.p = Math.min(0.97, mr.p + mr.speed);\n      if (mr.barRef.current) mr.barRef.current.style.width = (mr.p*100).toFixed(1)+'%';\n      if (mr.statRef.current) mr.statRef.current.textContent = 'В ПУТИ · '+Math.round(mr.p*100)+'%';\n    }, 90);\n  }\n  componentWillUnmount(){\n    if (this._fxRaf) cancelAnimationFrame(this._fxRaf);\n    if (this._onResize) window.removeEventListener('resize', this._onResize);\n    if (this._cdInt) clearInterval(this._cdInt);\n    if (this._coordInt) clearInterval(this._coordInt);\n    if (this._manInt) clearInterval(this._manInt);\n    if (this._doorRaf) cancelAnimationFrame(this._doorRaf);\n    if (this._doorFallback) clearTimeout(this._doorFallback);\n    if (this._onScrollReveal){ window.removeEventListener('scroll', this._onScrollReveal); window.removeEventListener('resize', this._onScrollReveal); }\n    (this._revealTimers || []).forEach(clearTimeout);\n  }\n  manifest = [\n    { code:'TAU-01', from:'ROTTERDAM', to:'NEW YORK', p:0.62, speed:0.0016, arrived:0 },\n    { code:'TAU-04', from:'SHANG ; seed();\n    for (let i=0;i<3;i++) spawnRoute();\n\n    const reduced = this.prefersReduced();\n    let last = performance.now(), acc = 0, t = 0, ay = 0;\n\n    const project = (v, rs) => {\n      const cx=W/2, cy=H*0.5, R=Math.min(W,H)*0.4;\n      const tx = -0.34;\n      const X=v[0]*rs, Y=v[1]*rs, Z=v[2]*rs;\n      const X1 = X*Math.cos(ay)+Z*Math.sin(ay);\n      const Z1 = -X*Math.sin(ay)+Z*Math.cos(ay);\n      const Y1 = Y;\n      const Y2 = Y1*Math.cos(tx)-Z1*Math.sin(tx);\n      const Z2 = Y1*Math.sin(tx)+Z1*Math.cos(tx);\n      return { x: cx + X1*R, y: cy - Y2*R, z: Z2 };\n    };\n    const slerp = (A,B,tt) => {\n      let d=A[0]*B[0]+A[1]*B[1]+A[2]*B[2]; d=Math.max(-1,Math.min(1,d));\n      const o=Math.acos(d); if(o<1e-4) return [A[0],A[1],A[2]];\n      const s=Math.sin(o), s1=Math.sin((1-tt)*o)/s, s2=Math.sin(tt*o)/s;\n      return [A[0]*s1+B[0]*s2, A[1]*s1+B[1]*s2, A[2]*s1+B[2]*s2];\n    };\n\n    const draw = (now) => {\n      const dt = reduced ? 0 : Math.min(0.05, (now-last)/1000);\n      last = now; t += dt; if(!reduced) ay += dt*0.05;\n      ctx.clearRect(0,0,W,H);\n      const cx=W/2, cy=H*0.5, R=Math.min(W,H)*0.4;\n\n      // starfield\n      for (const s of stars){ ctx.fillStyle='rgba(198,205,222,'+s.a+')'; ctx.fillRect(s.x*W,s.y*H,s.r,s.r); }\n\n      ctx.globalCompositeOperation = 'lighter';\n\n      // atmosphere rim glow\n      const ag = ctx.createRadialGradient(cx,cy,R*0.82,cx,cy,R*1.24);\n      ag.addColorStop(0,'rgba(38,104,255,0)'); ag.addColorStop(0.65,'rgba(42,76,235,0.12)'); ag.addColorStop(1,'rgba(42,76,235,0)');\n      ctx.fillStyle=ag; ctx.beginPath(); ctx.arc(cx,cy,R*1.24,0,6.283); ctx.fill();\n\n      // wireframe globe (front hemisphere)\n      ctx.lineWidth=1;\n      const strokePts=(pts)=>{ for(let k=0;k<pts.length-1;k++){ const p=pts[k],q=pts[k+1]; const a=(Math.max(0,p.z)+Math.max(0,q.z))/2; if(a<=0.02) continue; ctx.strokeStyle='rgba(72,102,235,'+(0.16*a)+')'; ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y); ctx.stroke(); } };\n      for (let m=0;m<12;m++){ const lon=m/12*6.283; const pts=[]; for(let i=0;i<=40;i++){ const lat=-1.45+2.9*i/40; pts.push(project([Math.cos(lat)*Math.cos(lon),Math.sin(lat),Math.cos(lat)*Math.sin(lon)],1)); } strokePts(pts); }\n      for (let pa=1;pa<6;pa++){ const lat=-1.2+2.4*pa/6; const pts=[]; for(let i=0;i<=48;i++){ const lon=6.283*i/48; pts.push(project([Math.cos(lat)*Math.cos(lon),Math.sin(lat),Math.cos(lat)*Math.sin(lon)],1)); } strokePts(pts); }\n\n      if(!reduced) for(const n of nodes) n.lit*=0.95;\n\n      // routes (lifted arcs)\n      for (let r=routes.length-1; r>=0; r--){ const rt=routes[r];\n        if(!reduced){ rt.life+=dt; rt.prog=Math.min(1,rt.prog+dt*rt.speed); if(rt.life>rt.ttl) rt.fade-=dt*0.5; if(rt.fade<=0){ routes.splice(r,1); continue; } } else rt.prog=1;\n        const A=nodes[rt.a].v, B=nodes[rt.b].v, SEG=40, pts=[];\n        for(let i=0;i<=SEG;i++){ const tt=i/SEG; const v=slerp(A,B,tt); const lift=1+rt.h*Math.sin(Math.PI*tt); pts.push(project(v,lift)); }\n        const upto=Math.floor(SEG*rt.prog);\n        ctx.lineWidth=1.7; ctx.lineCap='round'; ctx.lineJoin='round';\n        ctx.shadowColor='rgba(60,90,255,'+(0.5*rt.fade)+')'; ctx.shadowBlur=7;\n        for(let k=0;k<upto;k++){ const p=pts[k],q=pts[k+1]; const dep=(Math.max(0,p.z)+Math.max(0,q.z))/2; if(dep<=0.01) continue; const a=0.6*rt.fade*Math.min(1,dep*1.6+0.2); ctx.strokeStyle='rgba(108,134,255,'+a+')'; ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y); ctx.stroke(); }\n        ctx.shadowBlur=0;\n        if(rt.prog>=1){ nodes[rt.a].lit=Math.max(nodes[rt.a].lit,rt.fade); nodes[rt.b].lit=Math.max(nodes[rt.b].lit,rt.fade);\n          if(!reduced){ const f=(t*0.4+r*0.2)%1; const idx=Math.min(SEG,Math.floor(f*SEG)); const p=pts[idx]; if(p&&p.z>0){ const pg=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,7); pg.addColorStop(0,'rgba(228,233,244,'+(0.95*rt.fade)+')'); pg.addColorStop(1,'rgba(120,150,255,0)'); ctx.fillStyle=pg; ctx.beginPath(); ctx.arc(p.x,p.y,7,0,6.283); ctx.fill(); } } }\n      }\n\n      // city nodes (front hemisphere)\n      for (const n of nodes){ const p=project(n.v,1); if(p.z<=0.02) continue; const depth=p.z; const tw=0.5+0.5*Math.sin(t*1.2+n.ph); const base=n.hub?2.3:1.3; const rr=base+n.lit*1.4; const al=((n.hub?0.55:0.34)+n.lit*0.5)*Math.min(1,depth*1.3+0.12);\n        const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,rr*4.5); g.addColorStop(0,'rgba(150,178,255,'+(al*(0.7+0.3*tw))+')'); g.addColorStop(0.5,'rgba(55,90,255,'+(al*0.4)+')'); g.addColorStop(1,'rgba(55,90,255,0)'); ctx.fillStyle=g; ctx.beginPath(); ctx.arc(p.x,p.y,rr*4.5,0,6.283); ctx.fill();\n        ctx.fillStyle='rgba(234,238,248,'+Math.min(1,al+0.2)+')'; ctx.beginPath(); ctx.arc(p.x,p.y,rr*0.7,0,6.283); ctx.fill();\n        if(n.hub&&n.lit>0.05){ ctx.strokeStyle='rgba(108,134,255,'+(n.lit*0.6*depth)+')'; ctx.lineWidth=1; ctx.beginPath(); ctx.arc(p.x,p.y,rr*2.6,0,6.283); ctx.stroke(); }\n      }\n\n      ctx.globalCompositeOperation='source-over';\n      if(!reduced){ acc+=dt; if(acc>2){ acc=0; spawnRoute(); } }\n      if(!reduced) this._fxRaf=requestAnimationFrame(draw);\n    };\n    if (reduced){ draw(performance.now()); }\n    else this._fxRaf = requestAnimationFrame(draw);\n  }\n  componentDidUpdate(){\n    this.applyTheme();\n    if (this._doorsOpen){\n      if (this.leftDoorRef.current){ const L=this.leftDoorRef.current; L.style.transform='rotateY(-105deg)'; L.style.opacity='0'; L.style.visibility='hidden'; }\n      if (this.rightDoorRef.current){ const R=this.rightDoorRef.current; R.style.transform='rotateY(105deg)'; R.style.opacity='0'; R.style.visibility='hidden'; }\n    }\n    for (const el of this._shownEls){ if (el){ el.style.opacity = '1'; el.style.transform = 'none'; } }\n    if (this._onScrollReveal) this.paintBright();\n  }\n  applyTheme(){\n    const b = document.body; if(!b) return;\n    b.style.setProperty('--ikb', this.props.accentColor || '#2668ff');\n    b.setAttribute('data-rm', this.props.reduceMotion ? '
